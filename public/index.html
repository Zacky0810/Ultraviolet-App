<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
        />
        <title>Google Docs - Revision Notes</title>
        <meta
            name="description"
            content="Educational collaboration workspace for student revision notes, task tracking, and study group organization."
        />
        <meta
            name="keywords"
            content="education, homework, study, learning, group project, revision notes, school task tracker"
        />
        <meta
            name="theme-color"
            media="(prefers-color-scheme: dark)"
            content="#434c5e"
        />
        <meta name="googlebot" content="index, follow, snippet" />
        <link rel="shortcut icon" content="favicon.ico" />
        <link rel="stylesheet" href="index.css" />
        
        <script src="baremux/index.js"></script>
        <script src="uv/uv.bundle.js"></script>
        <script src="uv/uv.config.js"></script>
    </head>

    <body>
        <div
            title="Workspace"
            class="flex-center logo-wrapper header-center"
        >
            <h1>Study Workspace | Home</h1>
        </div>
        <div class="flex-center desc left-margin">
            <p>
                Welcome to the student collaboration portal. Use the search bar below to find reference documentation.
            </p>
        </div>

        <form id="uv-form" class="flex-center">
            <input
                id="uv-search-engine"
                value="https://www.google.com/search?q=%s"
                type="hidden"
            />
            <input id="uv-address" type="text" placeholder="Search reference database..." />
        </form>
        <div class="desc left-margin">
            <p id="uv-error"></p>
            <pre id="uv-error-code"></pre>
        </div>
        <footer>
            <div>
                <span>Revision Tool &copy; 2026</span>
            </div>
        </footer>
        <iframe style="display: none" id="uv-frame"></iframe>
        <script src="register-sw.js"></script>
        <script src="search.js"></script>
        <script src="index.js"></script>
    </body>
</html>
